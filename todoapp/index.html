<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Izzy Task — Todo App</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── MAIN PAGE ─────────────────────────────────────────── -->
<div class="page" id="mainPage">
  <div class="app">
    <div class="header">
      <div class="header-top">
        <h1 class="logo">Izzy <span>Task</span></h1>
        <div class="date-badge" id="dateBadge"></div>
      </div>
      <p class="subtitle">Stay focused. Get things done.</p>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-num accent" id="doneCount">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="pendingCount">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progress</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </div>
    <div class="input-card">
      <select class="priority-select" id="prioritySelect" title="Priority">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Med</option>
        <option value="high">🔴 High</option>
      </select>
      <input type="text" id="taskInput" placeholder="Add a new task…" autocomplete="off">
      <button id="addBtn">+ Add</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search tasks…">
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="high">🔴 High</button>
      <button class="filter-btn" data-filter="medium">🟡 Med</button>
      <button class="filter-btn" data-filter="low">🟢 Low</button>
    </div>
    <button id="clearAllBtn">Clear All</button>
    <ul id="taskList"></ul>
    <div class="bottom-bar" id="bottomBar" style="display:none">
      <span class="bottom-count" id="bottomCount"></span>
      <button class="clear-btn" id="clearDone">Clear completed</button>
    </div>
  </div>
</div>

<!-- ── DETAIL PAGE ───────────────────────────────────────── -->
<div class="page" id="detailPage">
  <div class="app">

    <div class="detail-header">
      <button class="back-btn" id="backBtn">
        <span class="back-arrow">←</span>
        <span>Back</span>
      </button>
      <span class="detail-badge" id="detailPriorityBadge"></span>
    </div>

    <div class="detail-card">
      <div class="detail-status-row">
        <div class="custom-check" id="detailCheck" title="Toggle done"></div>
        <span class="detail-status-label" id="detailStatusLabel">Pending</span>
      </div>

      <div class="detail-title-wrap">
        <input
          type="text"
          class="detail-title-input"
          id="detailTitle"
          placeholder="Task title…"
          maxlength="120"
        >
      </div>

      <div class="detail-field">
        <label class="detail-label">📝 Notes</label>
        <textarea
          class="detail-textarea"
          id="detailNotes"
          placeholder="Add notes, links, or details about this task…"
          rows="5"
        ></textarea>
      </div>

      <div class="detail-row">
        <div class="detail-field half">
          <label class="detail-label">📅 Due Date</label>
          <input type="date" class="detail-date" id="detailDue">
        </div>
        <div class="detail-field half">
          <label class="detail-label">⚡ Priority</label>
          <select class="detail-priority-select" id="detailPriority">
            <option value="low">🟢 Low</option>
            <option value="medium">🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
      </div>

      <div class="detail-meta-block">
        <div class="detail-meta-item">
          <span class="detail-meta-label">Created</span>
          <span class="detail-meta-val" id="detailCreated">—</span>
        </div>
        <div class="detail-meta-item">
          <span class="detail-meta-label">Task ID</span>
          <span class="detail-meta-val mono" id="detailId">—</span>
        </div>
      </div>
    </div>

    <div class="detail-actions">
      <button class="detail-save-btn" id="detailSaveBtn">Save Changes</button>
      <button class="detail-del-btn" id="detailDelBtn">🗑 Delete Task</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
